<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JEFF">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080808'/><text y='72' x='50' text-anchor='middle' font-size='64' font-family='Arial Black,sans-serif' font-weight='900' fill='white'>J</text></svg>">
<title>JEFF — Training</title>
<style>
:root{--bg:#080808;--s1:#111;--s2:#161616;--s3:#1e1e1e;--b1:#1f1f1f;--b2:#2a2a2a;--b3:#383838;--t1:#f0f0f0;--t2:#888;--t3:#444;--t4:#2a2a2a;--acc:#ffffff;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Display','Inter',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:90px;}
input,textarea,button{font-family:inherit;}
input[type=number]{-moz-appearance:textfield;}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;}
button{cursor:pointer;}

/* Header */
.hdr{padding:54px 20px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid var(--b1);}
.hdr-l{display:flex;flex-direction:column;gap:1px;}
.hdr-eye{font-size:9px;letter-spacing:4px;color:var(--t4);text-transform:uppercase;}
.hdr-name{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.hdr-tabs{display:flex;gap:4px;}
.htab{padding:6px 12px;border-radius:8px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:all .15s;}
.htab.on{background:var(--acc);color:var(--bg);border-color:var(--acc);}

/* Day tabs */
.day-scroll{overflow-x:auto;padding:14px 20px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-inner{display:flex;gap:6px;min-width:max-content;}
.daybtn{padding:8px 14px;border-radius:10px;border:1px solid var(--b1);background:transparent;color:var(--t4);font-size:11px;font-weight:700;letter-spacing:.5px;position:relative;transition:all .15s;}
.daybtn.on{border-color:var(--acc);background:var(--s1);color:var(--acc);}
.daybtn.has{color:var(--t2);}
.daydot{position:absolute;top:5px;right:5px;width:4px;height:4px;border-radius:50%;background:var(--acc);opacity:.5;}

/* Stats */
.stats{display:flex;margin:12px 20px 0;background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;}
.stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--b1);}
.stat:last-child{border-right:none;}
.stat-val{font-size:17px;font-weight:800;color:var(--acc);letter-spacing:-.5px;}
.stat-lbl{font-size:8px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}

/* BW card */
.bw-card{margin:10px 20px 0;background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;}
.bw-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.bw-lbl{font-size:9px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;}
.bw-cur{font-size:12px;font-weight:700;color:var(--t2);}
.bw-row{display:flex;gap:8px;}
.bw-in{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:14px;padding:9px 12px;}
.bw-btn{background:var(--acc);border:none;border-radius:8px;color:var(--bg);font-size:12px;font-weight:800;padding:9px 16px;}

/* Plate calculator */
.plate-card{margin:10px 20px 0;background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;}
.plate-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.plate-lbl{font-size:9px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;}
.plate-row{display:flex;gap:8px;margin-bottom:10px;}
.plate-in{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:14px;padding:9px 12px;}
.plate-btn{background:var(--acc);border:none;border-radius:8px;color:var(--bg);font-size:12px;font-weight:800;padding:9px 16px;}
.plate-result{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.plate-chip{border-radius:20px;padding:5px 12px;font-size:12px;font-weight:800;border:2px solid;}
.plate-45{background:#1a1a1a;border-color:var(--acc);color:var(--acc);}
.plate-35{background:#1a1a1a;border-color:#a78bfa;color:#a78bfa;}
.plate-25{background:#1a1a1a;border-color:#60a5fa;color:#60a5fa;}
.plate-10{background:#1a1a1a;border-color:#34d399;color:#34d399;}
.plate-5{background:#1a1a1a;border-color:#fbbf24;color:#fbbf24;}
.plate-2{background:#1a1a1a;border-color:#f87171;color:#f87171;}
.plate-note{font-size:10px;color:var(--t3);width:100%;margin-top:4px;}

/* Exercise cards */
.ex-list{padding:10px 20px 0;}
.ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:8px;transition:all .2s;}
.ex-card.has-sets{border-color:var(--b2);}
.ex-card.dragging{opacity:.3;}
.ex-card.drag-over{border-color:var(--acc);}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.ex-left{display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0;}
.drag-handle{color:var(--t4);font-size:14px;padding:2px 0;cursor:grab;user-select:none;flex-shrink:0;line-height:1.4;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:4px;}
.ex-name.active{color:var(--t1);}
.ex-progress{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.prog-arrow{font-size:11px;font-weight:800;}
.prog-arrow.up{color:var(--green);}
.prog-arrow.down{color:var(--red);}
.prog-arrow.same{color:var(--t3);}
.last-sets-label{font-size:9px;letter-spacing:2px;color:var(--t4);text-transform:uppercase;margin-bottom:4px;}
.last-sets-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.last-chip{background:var(--s3);border-radius:5px;padding:3px 7px;font-size:10px;color:var(--t3);font-weight:600;}
.last-chip.warmup{opacity:.5;font-style:italic;}
.cur-sets-label{font-size:9px;letter-spacing:2px;color:var(--t4);text-transform:uppercase;margin-bottom:4px;}
.sets-list{margin-bottom:8px;display:flex;flex-direction:column;gap:3px;}
.set-row{display:flex;align-items:center;gap:6px;}
.set-num{font-size:9px;font-weight:800;color:var(--t4);width:18px;letter-spacing:.5px;}
.set-chip{flex:1;background:var(--s2);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--acc);}
.set-chip.pr{background:#1a1a1a;border:1px solid var(--acc);}
.set-chip.up{border-left:2px solid var(--green);}
.set-chip.down{border-left:2px solid var(--red);}
.set-chip.warmup{color:var(--t3);background:var(--s3);font-style:italic;}
.set-del{background:none;border:none;color:var(--t4);font-size:13px;padding:0 2px;}
.wu-toggle{background:none;border:1px solid var(--b2);border-radius:4px;color:var(--t4);font-size:9px;padding:2px 5px;font-weight:700;letter-spacing:.5px;}
.wu-toggle.active{border-color:var(--yellow);color:var(--yellow);}
.e1rm{font-size:9px;color:var(--t4);margin-top:2px;}
.e1rm span{color:var(--t3);font-weight:700;}
.ex-badges{display:flex;gap:4px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px;}
.badge-pr{background:var(--acc);color:var(--bg);}
.badge-custom{background:var(--s2);color:var(--t2);border:1px solid var(--b2);}
.ex-rm{background:none;border:none;color:var(--t3);font-size:14px;padding:2px 4px;}

/* Copy last session btn */
.copy-last-btn{width:100%;padding:8px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}

/* Input */
.input-row{display:flex;gap:6px;}
.ex-input{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:14px;padding:9px 10px;}
.ex-input::placeholder{color:var(--t4);}
.add-btn{background:var(--acc);border:none;border-radius:8px;color:var(--bg);font-size:22px;font-weight:900;width:40px;flex-shrink:0;}

/* Insert / add */
.insert-zone{display:flex;justify-content:center;margin:4px 0;}
.insert-btn{background:none;border:1px dashed var(--b1);border-radius:6px;color:var(--t4);font-size:9px;padding:3px 18px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;}
.add-ex-form{display:flex;gap:6px;margin:6px 0;}
.add-ex-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);font-size:13px;padding:9px 12px;}
.add-ex-ok{background:var(--acc);border:none;border-radius:8px;color:var(--bg);font-weight:800;font-size:12px;padding:9px 14px;}
.add-ex-cancel{background:var(--s2);border:none;border-radius:8px;color:var(--t2);font-weight:700;font-size:12px;padding:9px 12px;}
.add-end-btn{width:100%;padding:12px;border-radius:12px;border:1px dashed var(--b1);background:transparent;color:var(--t4);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}

/* Notes */
.notes-sec{margin:10px 20px 0;}
.notes-lbl{font-size:9px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;margin-bottom:6px;}
.notes-ta{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:12px;color:var(--t2);font-size:13px;padding:12px 14px;resize:none;min-height:60px;}
.notes-ta::placeholder{color:var(--t4);}

/* Finish */
.finish-wrap{padding:12px 20px 0;}
.finish-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--acc);color:var(--bg);font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;}

/* Rest popup */
.rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.rest-popup{background:var(--s1);border:1px solid var(--b2);border-radius:24px 24px 0 0;padding:28px 24px 44px;width:100%;max-width:430px;}
.rest-popup-title{font-size:10px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;text-align:center;margin-bottom:6px;}
.rest-set-info{font-size:13px;color:var(--t2);text-align:center;margin-bottom:20px;}
.rest-set-info strong{color:var(--t1);}
.rest-countdown{font-size:72px;font-weight:900;letter-spacing:-4px;text-align:center;font-variant-numeric:tabular-nums;margin-bottom:8px;transition:color .3s;}
.rest-countdown span{font-size:28px;opacity:.5;}
.rest-bar-wrap{height:3px;background:var(--s3);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.rest-bar{height:100%;background:var(--acc);border-radius:2px;transition:width .1s linear,background .3s;}
.rest-presets{display:flex;gap:8px;margin-bottom:12px;}
.rest-preset-btn{flex:1;padding:14px 8px;border-radius:12px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:14px;font-weight:800;transition:all .15s;}
.rest-preset-btn.active{background:var(--s2);border-color:var(--acc);color:var(--acc);}
.rest-preset-lbl{font-size:9px;color:var(--t4);display:block;margin-top:3px;letter-spacing:.5px;}
.rest-skip{width:100%;padding:14px;border-radius:12px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* History */
.hist-wrap{padding:14px 20px 0;}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.hist-count{font-size:10px;letter-spacing:2px;color:var(--t4);text-transform:uppercase;}
.clear-btn{background:none;border:1px solid var(--b1);border-radius:6px;color:var(--t3);font-size:9px;padding:4px 10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.hist-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:10px;}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.hist-day{font-size:13px;font-weight:700;}
.hist-right{display:flex;align-items:center;gap:8px;}
.hist-date{font-size:10px;color:var(--t3);}
.hist-del{background:none;border:none;color:var(--t3);font-size:15px;padding:0 2px;}
.hist-meta{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
.hist-meta-item{font-size:10px;color:var(--t4);}
.hist-meta-item b{color:var(--t2);font-weight:700;}
.hist-notes{font-size:11px;color:var(--t3);font-style:italic;margin-bottom:10px;padding-left:10px;border-left:2px solid var(--b2);line-height:1.5;}
.hist-ex{margin-bottom:10px;}
.hist-ex-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.hist-ex-name{font-size:10px;color:var(--t2);font-weight:700;}
.hist-ex-change{font-size:10px;font-weight:800;}
.hist-ex-change.up{color:var(--green);}
.hist-ex-change.down{color:var(--red);}
.hist-ex-change.same{color:var(--t4);}
.hist-sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px;}
.hist-set{background:var(--s2);border-radius:6px;padding:5px 8px;text-align:center;}
.hist-set-num{font-size:8px;color:var(--t4);letter-spacing:.5px;margin-bottom:1px;}
.hist-set-val{font-size:11px;color:var(--t1);font-weight:700;}
.hist-set-reps{font-size:9px;color:var(--t2);}
.hist-set.improved{border:1px solid var(--green);}
.hist-set.declined{border:1px solid var(--red);}
.hist-set.warmup-set{opacity:.5;}
.hist-divider{border:none;border-top:1px solid var(--b1);margin:10px 0;}

/* Body view */
.body-wrap{padding:14px 20px 0;}
.graph-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:12px;}
.graph-lbl{font-size:9px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;margin-bottom:14px;}
.graph-bars{display:flex;gap:4px;align-items:flex-end;height:80px;}
.graph-bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.graph-b{width:100%;background:var(--s2);border-radius:3px 3px 0 0;min-height:3px;}
.graph-b.latest{background:var(--acc);}
.graph-bl{font-size:8px;color:var(--t4);}
.bw-list{display:flex;flex-direction:column;gap:6px;}
.bw-item{display:flex;justify-content:space-between;align-items:center;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;}
.bw-w{font-size:16px;font-weight:900;}
.bw-d{font-size:10px;color:var(--t3);}
.bw-c{font-size:11px;font-weight:700;}
.empty{color:var(--t4);font-size:13px;text-align:center;margin-top:80px;line-height:2.2;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-eye">Training Log</div>
    <div class="hdr-name">JEFF</div>
  </div>
  <div class="hdr-tabs">
    <button class="htab on" id="tab-log" onclick="switchView('log')">Log</button>
    <button class="htab" id="tab-history" onclick="switchView('history')">Hist <span id="hcount">0</span></button>
    <button class="htab" id="tab-body" onclick="switchView('body')">Body</button>
  </div>
</div>

<div id="view-log">
  <div class="day-scroll"><div class="day-inner" id="day-tabs"></div></div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="v-sets">0</div><div class="stat-lbl">Sets</div></div>
    <div class="stat"><div class="stat-val" id="v-ton">0</div><div class="stat-lbl">Tonnage</div></div>
    <div class="stat"><div class="stat-val" id="v-exs">0</div><div class="stat-lbl">Exercises</div></div>
    <div class="stat" onclick="stopDur()" style="cursor:pointer;">
      <div class="stat-val" id="v-dur">0:00</div>
      <div class="stat-lbl">Duration ■</div>
    </div>
  </div>

  <!-- Plate Calculator -->
  <div class="plate-card">
    <div class="plate-top">
      <div class="plate-lbl">Plate Calculator</div>
    </div>
    <div class="plate-row">
      <input class="plate-in" type="number" id="plate-in" placeholder="Target weight (lbs)">
      <button class="plate-btn" onclick="calcPlates()">Calc</button>
    </div>
    <div class="plate-result" id="plate-result"></div>
  </div>

  <!-- BW -->
  <div class="bw-card">
    <div class="bw-top"><div class="bw-lbl">Bodyweight</div><div class="bw-cur" id="bw-cur"></div></div>
    <div class="bw-row">
      <input class="bw-in" type="number" id="bw-in" placeholder="lbs today...">
      <button class="bw-btn" onclick="logBW()">Log</button>
    </div>
  </div>

  <div class="ex-list" id="ex-list"></div>
  <div class="notes-sec">
    <div class="notes-lbl">Session Notes</div>
    <textarea class="notes-ta" id="sess-notes" placeholder="How'd it feel? Anything to note..."></textarea>
  </div>
  <div class="finish-wrap" id="finish-wrap"></div>
</div>

<!-- Rest Popup -->
<div class="rest-overlay" id="rest-overlay" style="display:none;">
  <div class="rest-popup">
    <div class="rest-popup-title">Rest Timer</div>
    <div class="rest-set-info" id="rest-set-info"></div>
    <div class="rest-countdown" id="rest-countdown" style="color:var(--t1);">0<span>:00</span></div>
    <div class="rest-bar-wrap"><div class="rest-bar" id="rest-bar" style="width:100%"></div></div>
    <div class="rest-presets">
      <button class="rest-preset-btn" id="rp90" onclick="setRestPreset(90,this)">90s<span class="rest-preset-lbl">Isolation</span></button>
      <button class="rest-preset-btn" id="rp120" onclick="setRestPreset(120,this)">2 min<span class="rest-preset-lbl">Accessory</span></button>
      <button class="rest-preset-btn" id="rp180" onclick="setRestPreset(180,this)">3 min<span class="rest-preset-lbl">Compound</span></button>
    </div>
    <button class="rest-skip" onclick="closeRest()">Skip Rest</button>
  </div>
</div>

<div id="view-history" style="display:none">
  <div class="hist-wrap" id="hist-list"></div>
</div>

<div id="view-body" style="display:none">
  <div class="body-wrap">
    <div class="graph-card">
      <div class="graph-lbl">Bodyweight Trend</div>
      <div class="graph-bars" id="bw-graph"></div>
    </div>
    <div class="bw-list" id="bw-list"></div>
  </div>
</div>

<script>
const PROGRAM={
  "Day 1 — Chest + Tri":["Incline Smith Press","Flat DB Press","Incline DB Press","Cable Fly (low to high)","Pec Deck","Skull Crushers","Rope Pushdown"],
  "Day 2 — Back + Bi":["Chest-Supported Row (plate loaded)","Lat Pulldown (wide grip)","Seated Cable Row","Cable Pullover","Face Pull","Rear Delt Machine","EZ Bar Curl","Incline DB Curl","Assisted Pull-Up Burnout"],
  "Day 3 — Shoulders + Arms":["Smith Seated Press","Seated Machine Press","Lateral Raise Machine","DB Lateral Raise","Rear Delt Machine","Skull Crushers","Overhead Cable Extension","Rope Pushdown","EZ Bar Curl","Incline DB Curl","Cable Curl","Hammer Curl"],
  "Day 4 — Chest + Tri":["Flat Barbell Press","Incline DB Press","Flat DB Press","Cable Fly (high to low)","Dips","Overhead Cable Extension","Tricep Pushdown (straight bar)"],
  "Day 5 — Back + Bi":["Chest-Supported Row (plate loaded)","Single Arm DB Row","Lat Pulldown (neutral grip)","Cable Pullover","Rear Delt Machine","Preacher Curl","Hammer Curl","Assisted Pull-Up Burnout"],
  "Day 6 — Legs + Shoulders + Arms":["Leg Press","Hack Squat","Leg Extension","Lying Leg Curl","Romanian Deadlift","Standing Calf Raise","Seated Calf Raise","Cable Crunch","Smith Seated Press","Lateral Raise Machine","Overhead Cable Extension","Rope Pushdown","EZ Bar Curl","Hammer Curl"]
};
const DAY_KEYS=Object.keys(PROGRAM);
const SK="jt_s_v5",HK="jt_h_v4",BWK="jt_bw_v2";

const SEED=[{
  date:"Jun 26, 2026",day:"Day 3 — Shoulders + Arms",
  notes:"First session at new gym. Added extra shoulder volume. Bis were sore from back day.",
  totalSets:37,tonnage:27845,
  exercises:{
    "Smith Seated Press":[{weight:"135",reps:"10",wu:false},{weight:"185",reps:"9",wu:false},{weight:"205",reps:"4",wu:false},{weight:"185",reps:"9",wu:false}],

let activeDay=localStorage.getItem('jt_activeDay')||DAY_KEYS[0];
let session={},history=[],bwLog=[],inputState={},addingAfter=null;
let sessStart=null,durIv=null,dragSrc=null;
let restIv=null,restRem=0,restTotal=0,lastSetInfo='';

function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function today(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

function calcTon(exs){
  let t=0;
  Object.values(exs||{}).forEach(s=>s.forEach(x=>{if(!x.wu)t+=(+x.weight||0)*(+x.reps||0);}));
  return Math.round(t);
}
function getSets(){return Object.values(session[activeDay]?.exercises||{}).reduce((a,s)=>a+s.filter(x=>!x.wu).length,0);}
function getExs(){return Object.values(session[activeDay]?.exercises||{}).filter(s=>s.length>0).length;}
function getOrder(d){return session[d]?.order||[...PROGRAM[d]];}
function e1rm(w,r){return r===1?w:Math.round(w*(1+r/30));}

function load(){
  session=ls(SK,{});
  history=ls(HK,null);
  if(!history||!history.length)history=SEED;
  bwLog=ls(BWK,[]);
  ss(HK,history);
}
function save(){ss(SK,session);ss(HK,history);ss(BWK,bwLog);}

function getPR(ex){
  let m=0;
  history.forEach(h=>(h.exercises?.[ex]||[]).forEach(s=>{if(!s.wu&&(+s.weight||0)>m)m=+s.weight;}));
  return m;
}
function getLastSession(dayKey){return history.filter(h=>h.day===dayKey)[0]||null;}
function getProgression(ex,dayKey,curSets){
  const last=getLastSession(dayKey);if(!last)return null;
  const lastSets=last.exercises?.[ex];if(!lastSets?.length)return null;
  const workingSets=curSets.filter(s=>!s.wu);
  const lastMaxW=Math.max(...lastSets.filter(s=>!s.wu).map(s=>+s.weight||0));
  const curMaxW=workingSets.length?Math.max(...workingSets.map(s=>+s.weight||0)):0;
  if(curMaxW===0)return{dir:'none',lastSets,lastMaxW};
  const diff=curMaxW-lastMaxW;
  return{dir:diff>0?'up':diff<0?'down':'same',diff,curMaxW,lastMaxW,lastSets};
}

// Plate calculator
function calcPlates(){
  const target=parseFloat(document.getElementById('plate-in').value);
  const res=document.getElementById('plate-result');
  if(!target||target<45){res.innerHTML='<span style="font-size:11px;color:var(--t3);">Enter a weight ≥ 45 lbs</span>';return;}
  const barWeight=45;
  let perSide=(target-barWeight)/2;
  const plates=[45,35,25,10,5,2.5];
  const used=[];
  plates.forEach(p=>{const count=Math.floor(perSide/p);if(count>0){used.push({p,count});perSide=+(perSide-(p*count)).toFixed(2);}});
  if(used.length===0){res.innerHTML='<span style="font-size:11px;color:var(--t3);">Just the bar (45 lbs)</span>';return;}
  const classes={45:'plate-45',35:'plate-35',25:'plate-25',10:'plate-10',5:'plate-5',2.5:'plate-2'};
  let html=used.map(({p,count})=>`<span class="plate-chip ${classes[p]||'plate-2'}">${count>1?count+'×':''}${p}</span>`).join('');
  const actualWeight=barWeight+used.reduce((a,{p,count})=>a+p*count*2,0);
  html+=`<span class="plate-note">per side · actual: ${actualWeight} lbs${actualWeight!==target?' (closest)':''}</span>`;
  res.innerHTML=html;
}

function stopDur(){if(durIv){clearInterval(durIv);durIv=null;sessStart=null;document.getElementById('v-dur').textContent='0:00';}}

// Rest popup
function openRest(setInfo){
  lastSetInfo=setInfo;
  document.getElementById('rest-set-info').innerHTML=setInfo;
  document.getElementById('rest-overlay').style.display='flex';
  document.querySelectorAll('.rest-preset-btn').forEach(b=>b.classList.remove('active'));
  restRem=0;restTotal=0;
  clearInterval(restIv);
  renderRestCountdown();
}
function closeRest(){
  clearInterval(restIv);
  document.getElementById('rest-overlay').style.display='none';
}
function setRestPreset(secs,btn){
  clearInterval(restIv);
  document.querySelectorAll('.rest-preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  restTotal=secs*1000;restRem=secs*1000;
  renderRestCountdown();
  restIv=setInterval(()=>{
    restRem-=100;
    if(restRem<=0){restRem=0;clearInterval(restIv);setTimeout(closeRest,800);}
    renderRestCountdown();
  },100);
}
function renderRestCountdown(){
  const ts=Math.floor(restRem/1000),m=Math.floor(ts/60),s=ts%60,t=Math.floor((restRem%1000)/100);
  const pct=restTotal?restRem/restTotal:1;
  const color=pct>0.5?'var(--t1)':pct>0.2?'var(--yellow)':'var(--green)';
  const cd=document.getElementById('rest-countdown');
  cd.style.color=restTotal?color:'var(--t4)';
  cd.innerHTML=restTotal?`${m}<span>:${String(s).padStart(2,'0')}.${t}</span>`:`0<span>:00</span>`;
  const bar=document.getElementById('rest-bar');
  bar.style.width=(pct*100)+'%';
  bar.style.background=color;
}

function renderStats(){
  const sets=getSets(),ton=calcTon(session[activeDay]?.exercises),exs=getExs();
  document.getElementById('v-sets').textContent=sets;
  document.getElementById('v-ton').textContent=ton>=1000?(ton/1000).toFixed(1)+'k':ton;

  document.getElementById('sess-notes').oninput=e=>{
    if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
    session[activeDay].notes=e.target.value;save();
  };

function setupDrag(card,ex){
  card.draggable=true;
  card.addEventListener('dragstart',e=>{dragSrc=ex;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(dragSrc===ex||!dragSrc)return;
    if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
    const order=session[activeDay].order||[...PROGRAM[activeDay]];
    const from=order.indexOf(dragSrc),to=order.indexOf(ex);
    if(from<0||to<0)return;
    order.splice(from,1);order.splice(to,0,dragSrc);
    session[activeDay].order=order;save();render();
  });
}

// Copy last session weights
function copyLastSession(ex){
  const last=getLastSession(activeDay);
  if(!last?.exercises?.[ex]?.length)return;
  if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
  if(!session[activeDay].exercises[ex])session[activeDay].exercises[ex]=[];
  last.exercises[ex].forEach(s=>{
    session[activeDay].exercises[ex].push({weight:s.weight,reps:s.reps,wu:s.wu||false});
  });
  save();render();
}

function toggleWarmup(ex,idx){
  const sets=session[activeDay]?.exercises?.[ex];
  if(!sets||!sets[idx])return;
  sets[idx].wu=!sets[idx].wu;
  save();render();
}

function renderExList(){
  const order=getOrder(activeDay),dayLog=session[activeDay]?.exercises||{};
  const c=document.getElementById('ex-list');c.innerHTML='';

  order.forEach((ex)=>{
    const sets=dayLog[ex]||[];
    const isCustom=!PROGRAM[activeDay].includes(ex);
    const pr=getPR(ex);
    const workingSets=sets.filter(s=>!s.wu);
    const curMaxW=workingSets.length?Math.max(...workingSets.map(s=>+s.weight||0)):0;
    const isPR=curMaxW>0&&curMaxW>pr;
    const prog=getProgression(ex,activeDay,sets);
    const lastSession=getLastSession(activeDay);
    const hasLastSession=lastSession?.exercises?.[ex]?.length>0;

    const card=document.createElement('div');card.className='ex-card'+(sets.length?' has-sets':'');
    setupDrag(card,ex);

    // Top
    const top=document.createElement('div');top.className='ex-top';
    const left=document.createElement('div');left.className='ex-left';
    const handle=document.createElement('div');handle.className='drag-handle';handle.textContent='⠿';
    const info=document.createElement('div');info.className='ex-info';
    const name=document.createElement('div');name.className='ex-name'+(sets.length?' active':'');name.textContent=ex;
    info.appendChild(name);

    if(prog&&prog.dir!=='none'){
      const pi=document.createElement('div');pi.className='ex-progress';
      const arrow=document.createElement('span');arrow.className='prog-arrow '+prog.dir;
      if(prog.dir==='up')arrow.textContent=`↑ +${prog.diff} lbs`;
      else if(prog.dir==='down')arrow.textContent=`↓ ${prog.diff} lbs`;
      else arrow.textContent='→ Same weight';
      pi.appendChild(arrow);info.appendChild(pi);
    }

    left.appendChild(handle);left.appendChild(info);
    const badges=document.createElement('div');badges.className='ex-badges';
    if(isPR){const b=document.createElement('span');b.className='badge badge-pr';b.textContent='PR';badges.appendChild(b);}
    if(isCustom){
      const b=document.createElement('span');b.className='badge badge-custom';b.textContent='CUSTOM';badges.appendChild(b);
      const rm=document.createElement('button');rm.className='ex-rm';rm.textContent='✕';rm.onclick=()=>removeEx(ex);badges.appendChild(rm);
    }
    top.appendChild(left);top.appendChild(badges);card.appendChild(top);

    // Last session sets
    if(prog?.lastSets?.length){
      const lbl=document.createElement('div');lbl.className='last-sets-label';lbl.textContent='Last Session';
      card.appendChild(lbl);
      const chips=document.createElement('div');chips.className='last-sets-chips';
      prog.lastSets.forEach(s=>{
        const ch=document.createElement('span');ch.className='last-chip'+(s.wu?' warmup':'');
        ch.textContent=s.wu?`(wu) ${s.weight}×${s.reps}`:`${s.weight}×${s.reps}`;
        chips.appendChild(ch);
      });
      card.appendChild(chips);
    }

    // Copy last session button
    if(hasLastSession&&sets.length===0){
      const copyBtn=document.createElement('button');copyBtn.className='copy-last-btn';
      copyBtn.textContent='↙ Copy Last Session';
      copyBtn.onclick=()=>copyLastSession(ex);
      card.appendChild(copyBtn);
    }

    // Current sets
    if(sets.length){
      const lbl=document.createElement('div');lbl.className='cur-sets-label';lbl.textContent='This Session';
      card.appendChild(lbl);
      const sl=document.createElement('div');sl.className='sets-list';
      const lastSets=prog?.lastSets||[];
      sets.forEach((s,i)=>{
        const setIsPR=!s.wu&&(+s.weight||0)>0&&(+s.weight||0)>pr;
        const lastSet=lastSets[i];
        let setClass='set-chip';
        if(s.wu)setClass+=' warmup';
        else if(setIsPR)setClass+=' pr';
        else if(lastSet&&!lastSet.wu){
          if((+s.weight||0)>(+lastSet.weight||0)||(+s.reps||0)>(+lastSet.reps||0))setClass+=' up';
          else if((+s.weight||0)<(+lastSet.weight||0)||(+s.reps||0)<(+lastSet.reps||0))setClass+=' down';
        }
        const row=document.createElement('div');row.className='set-row';
        const num=document.createElement('div');num.className='set-num';num.textContent=s.wu?'WU':(`S${i+1-sets.slice(0,i).filter(x=>x.wu).length}`);
        const chip=document.createElement('div');chip.className=setClass;
        chip.textContent=`${s.weight?s.weight+' lbs':''}${s.weight&&s.reps?' · ':''}${s.reps?s.reps+' reps':''}${s.wu?' (warm up)':''}`;
        const wuBtn=document.createElement('button');wuBtn.className='wu-toggle'+(s.wu?' active':'');
        wuBtn.textContent='WU';wuBtn.title='Toggle warm up set';wuBtn.onclick=()=>toggleWarmup(ex,i);
        const del=document.createElement('button');del.className='set-del';del.textContent='✕';del.onclick=()=>delSet(ex,i);
        row.appendChild(num);row.appendChild(chip);row.appendChild(wuBtn);row.appendChild(del);sl.appendChild(row);
      });
      card.appendChild(sl);
      // e1RM from working sets only
      if(workingSets.length){
        const bestSet=workingSets.reduce((best,s)=>{const est=e1rm(+s.weight||0,+s.reps||0);return est>e1rm(+best.weight||0,+best.reps||0)?s:best;},workingSets[0]);
        const est=e1rm(+bestSet.weight||0,+bestSet.reps||0);
        if(est>0){const e=document.createElement('div');e.className='e1rm';e.innerHTML=`Est. 1RM: <span>${est} lbs</span>`;card.appendChild(e);}
      }
    }

    // Input
    const ir=document.createElement('div');ir.className='input-row';
    const wi=document.createElement('input');wi.type='number';wi.className='ex-input';wi.placeholder='lbs';
    wi.value=inputState[ex]?.weight||'';wi.oninput=e=>{if(!inputState[ex])inputState[ex]={};inputState[ex].weight=e.target.value;};
    const ri=document.createElement('input');ri.type='number';ri.className='ex-input';ri.placeholder='reps';
    ri.value=inputState[ex]?.reps||'';ri.oninput=e=>{if(!inputState[ex])inputState[ex]={};inputState[ex].reps=e.target.value;};
    ri.onkeydown=e=>{if(e.key==='Enter')addSet(ex);};
    const ab=document.createElement('button');ab.className='add-btn';ab.textContent='+';ab.onclick=()=>addSet(ex);
    ir.appendChild(wi);ir.appendChild(ri);ir.appendChild(ab);card.appendChild(ir);
    c.appendChild(card);

    if(addingAfter===ex){c.appendChild(buildAddExForm(ex));}
    else{
      const iz=document.createElement('div');iz.className='insert-zone';
      const ib=document.createElement('button');ib.className='insert-btn';ib.textContent='+ insert';
      ib.onclick=()=>{addingAfter=ex;render();};iz.appendChild(ib);c.appendChild(iz);
    }
  });

  if(addingAfter==='__end__'){c.appendChild(buildAddExForm('__end__'));}
  else{
    const eb=document.createElement('button');eb.className='add-end-btn';eb.textContent='+ Add Exercise';
    eb.onclick=()=>{addingAfter='__end__';render();};c.appendChild(eb);
  }

  const fw=document.getElementById('finish-wrap');fw.innerHTML='';
  if(getSets()>0){
    const btn=document.createElement('button');btn.className='finish-btn';
    btn.textContent=`Complete Session · ${getSets()} Sets`;btn.onclick=finishSession;fw.appendChild(btn);
  }
}

function buildAddExForm(afterEx){
  const form=document.createElement('div');form.className='add-ex-form';
  const inp=document.createElement('input');inp.className='add-ex-input';inp.placeholder='Exercise name...';inp.type='text';
  inp.onkeydown=e=>{if(e.key==='Enter')confirmAddEx(afterEx,inp.value);if(e.key==='Escape'){addingAfter=null;render();}};
  const ok=document.createElement('button');ok.className='add-ex-ok';ok.textContent='Add';ok.onclick=()=>confirmAddEx(afterEx,inp.value);
  const cancel=document.createElement('button');cancel.className='add-ex-cancel';cancel.textContent='✕';cancel.onclick=()=>{addingAfter=null;render();};
  form.appendChild(inp);form.appendChild(ok);form.appendChild(cancel);
  setTimeout(()=>inp.focus(),50);return form;
}

function render(){renderDayTabs();renderStats();renderExList();renderBWCur();}

function renderHistory(){
  const c=document.getElementById('hist-list');
  c.innerHTML=`<div class="hist-header"><div class="hist-count">${history.length} Sessions</div>${history.length?`<button class="clear-btn" onclick="clearAll()">Clear All</button>`:''}</div>`;
  if(!history.length){c.innerHTML+='<div class="empty">No sessions yet.</div>';return;}
  history.forEach((sess,idx)=>{
    const card=document.createElement('div');card.className='hist-card';
    const ton=sess.tonnage||calcTon(sess.exercises);
    const sets=sess.totalSets||Object.values(sess.exercises||{}).reduce((a,x)=>a+x.filter(s=>!s.wu).length,0);
    card.innerHTML=`
      <div class="hist-top">
        <div><div class="hist-day">${sess.day}</div></div>
        <div class="hist-right"><div class="hist-date">${sess.date}</div><button class="hist-del" onclick="delSession(${idx})">✕</button></div>
      </div>
      <div class="hist-meta">
        <div class="hist-meta-item"><b>${sets}</b> working sets</div>
        <div class="hist-meta-item"><b>${ton.toLocaleString()}</b> lbs tonnage</div>
      </div>
      ${sess.notes?`<div class="hist-notes">${sess.notes}</div>`:''}
    `;
    const sameDayPrev=history.slice(idx+1).find(h=>h.day===sess.day);
    Object.entries(sess.exercises||{}).forEach(([ex,sets])=>{
      if(!sets.length)return;
      const ed=document.createElement('div');ed.className='hist-ex';
      const header=document.createElement('div');header.className='hist-ex-header';
      const nameEl=document.createElement('div');nameEl.className='hist-ex-name';nameEl.textContent=ex;
      header.appendChild(nameEl);
      if(sameDayPrev){
        const prevSets=sameDayPrev.exercises?.[ex];
        if(prevSets?.length){
          const curMaxW=Math.max(...sets.filter(s=>!s.wu).map(s=>+s.weight||0));
          const prevMaxW=Math.max(...prevSets.filter(s=>!s.wu).map(s=>+s.weight||0));
          const diff=curMaxW-prevMaxW;
          const ch=document.createElement('div');ch.className='hist-ex-change '+(diff>0?'up':diff<0?'down':'same');
          ch.textContent=diff>0?`↑ +${diff} lbs`:diff<0?`↓ ${diff} lbs`:'→ Same';
          header.appendChild(ch);
        }
      }
      ed.appendChild(header);
      const grid=document.createElement('div');grid.className='hist-sets-grid';
      const prevSets=sameDayPrev?.exercises?.[ex]||[];
      sets.forEach((s,i)=>{
        const prevSet=prevSets[i];
        let cls='hist-set'+(s.wu?' warmup-set':'');
        if(!s.wu&&prevSet&&!prevSet.wu){
          if((+s.weight||0)>(+prevSet.weight||0)||(+s.reps||0)>(+prevSet.reps||0))cls+=' improved';
          else if((+s.weight||0)<(+prevSet.weight||0)||(+s.reps||0)<(+prevSet.reps||0))cls+=' declined';
        }
        const setEl=document.createElement('div');setEl.className=cls;
        setEl.innerHTML=`<div class="hist-set-num">${s.wu?'WARM UP':`SET ${i+1}`}</div><div class="hist-set-val">${s.weight||'—'}</div><div class="hist-set-reps">${s.reps||'—'} reps</div>`;
        grid.appendChild(setEl);
      });
      ed.appendChild(grid);
      card.appendChild(ed);
    });
    c.appendChild(card);
  });
}

function delSession(idx){if(!confirm('Delete this session?'))return;history.splice(idx,1);save();renderHistory();document.getElementById('hcount').textContent=history.length;}
function clearAll(){if(!confirm('Delete ALL history?'))return;history=[];save();renderHistory();document.getElementById('hcount').textContent=0;}

function renderBody(){
  const g=document.getElementById('bw-graph'),l=document.getElementById('bw-list');
  g.innerHTML='';l.innerHTML='';
  if(!bwLog.length){g.innerHTML='<div style="color:var(--t4);font-size:11px;align-self:center;">Log your weight to see the trend</div>';return;}
  const recent=[...bwLog].slice(0,14).reverse();
  const mn=Math.min(...recent.map(b=>b.weight))-2,mx=Math.max(...recent.map(b=>b.weight))+2,rng=mx-mn||1;
  recent.forEach((b,i)=>{
    const h=Math.round(((b.weight-mn)/rng)*70)+10;
    const wrap=document.createElement('div');wrap.className='graph-bw';
    const bar=document.createElement('div');bar.className='graph-b'+(i===recent.length-1?' latest':'');bar.style.height=h+'px';
    const lbl=document.createElement('div');lbl.className='graph-bl';lbl.textContent=b.weight;
    wrap.appendChild(bar);wrap.appendChild(lbl);g.appendChild(wrap);
  });
  bwLog.forEach((b,i)=>{
    const prev=bwLog[i+1],diff=prev?+(b.weight-prev.weight).toFixed(1):null;
    const item=document.createElement('div');item.className='bw-item';
    const cc=diff===null?'var(--t3)':diff>0?'var(--green)':diff<0?'var(--red)':'var(--t3)';
    item.innerHTML=`<div class="bw-w">${b.weight} lbs</div><div class="bw-d">${b.date}</div>${diff!==null?`<div class="bw-c" style="color:${cc}">${diff>0?'+':''}${diff} lbs</div>`:''}`;
    l.appendChild(item);
  });
}

function addSet(ex){
  const w=inputState[ex]?.weight||'',r=inputState[ex]?.reps||'';
  if(!w&&!r)return;
  if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
  if(!session[activeDay].exercises[ex])session[activeDay].exercises[ex]=[];
  const newSet={weight:w,reps:r,wu:false};
  session[activeDay].exercises[ex].push(newSet);
  if(inputState[ex])inputState[ex].reps='';
  if(!sessStart)startDur();
  save();render();
  // Show rest popup
  const setNum=session[activeDay].exercises[ex].length;
  openRest(`<strong>${ex}</strong> — Set ${setNum} logged: ${w?w+' lbs':''} ${r?r+' reps':''}`);
}

function delSet(ex,idx){session[activeDay]?.exercises[ex]?.splice(idx,1);save();render();}
function confirmAddEx(afterEx,name){
  name=(name||'').trim();if(!name){addingAfter=null;render();return;}
  if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
  if(!session[activeDay].order)session[activeDay].order=[...PROGRAM[activeDay]];
  const order=session[activeDay].order;
  const idx=afterEx==='__end__'?order.length:order.indexOf(afterEx)+1;
  order.splice(idx,0,name);addingAfter=null;save();render();
}
function removeEx(ex){
  if(!session[activeDay])return;
  session[activeDay].order=(session[activeDay].order||PROGRAM[activeDay]).filter(e=>e!==ex);
  delete session[activeDay].exercises[ex];save();render();
}
function finishSession(){
  const day=session[activeDay];if(!day)return;
  if(!Object.values(day.exercises||{}).some(s=>s.length>0))return;
  history.unshift({date:day.date||today(),day:activeDay,exercises:day.exercises,notes:day.notes||'',totalSets:getSets(),tonnage:calcTon(day.exercises)});
  delete session[activeDay];stopDur();
  save();render();document.getElementById('hcount').textContent=history.length;
}

load();render();renderBWCur();
</script>
</body>
</html>
