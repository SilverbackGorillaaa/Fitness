<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JEFF">
<meta name="theme-color" content="#080808">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080808'/><text y='72' x='50' text-anchor='middle' font-size='64' font-family='Arial Black,sans-serif' font-weight='900' fill='white'>J</text></svg>">
<title>JEFF — Training</title>
<style>
:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #161616;
  --border: #1f1f1f;
  --border2: #2a2a2a;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #3a3a3a;
  --accent: #ffffff;
  --accent-dim: #333;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { background: var(--bg); color: var(--text); font-family: -apple-system,'SF Pro Display','Inter',sans-serif; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
input,textarea,button { font-family: inherit; }
input[type=number] { -moz-appearance: textfield; }
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button { -webkit-appearance: none; }
button { cursor: pointer; }

/* Header */
.hdr { padding: 54px 20px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 20; border-bottom: 1px solid var(--border); }
.hdr-left { display: flex; flex-direction: column; gap: 1px; }
.hdr-eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--text3); text-transform: uppercase; }
.hdr-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.hdr-tabs { display: flex; gap: 4px; }
.htab { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }
.htab.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Day selector */
.day-scroll { overflow-x: auto; padding: 14px 20px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-scroll::-webkit-scrollbar { display: none; }
.day-inner { display: flex; gap: 6px; min-width: max-content; }
.daybtn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 11px; font-weight: 700; letter-spacing: 0.5px; position: relative; transition: all 0.15s; }
.daybtn.on { border-color: var(--accent); background: var(--surface); color: var(--accent); }
.daybtn.has { color: var(--text2); }
.daydot { position: absolute; top: 5px; right: 5px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0.5; }

/* Stats bar */
.stats { display: flex; margin: 12px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.stat { flex: 1; padding: 12px 8px; text-align: center; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-val { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.stat-lbl { font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

/* Rest timer */
.timer-card { margin: 12px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; transition: border-color 0.4s; }
.timer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.timer-label { font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; }
.timer-status { font-size: 9px; font-weight: 800; letter-spacing: 1px; }
.timer-display { font-size: 56px; font-weight: 900; letter-spacing: -3px; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 14px; transition: color 0.4s; }
.timer-display span { font-size: 22px; opacity: 0.5; font-weight: 700; }
.timer-btns { display: flex; gap: 8px; margin-bottom: 12px; }
.timer-main-btn { flex: 2; padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
.timer-reset-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.timer-presets { display: flex; gap: 6px; }
.timer-preset { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 11px; font-weight: 700; transition: all 0.15s; }
.timer-preset:active, .timer-preset.active-preset { background: var(--surface2); border-color: var(--border2); color: var(--text); }
.timer-preset-lbl { font-size: 8px; color: var(--text3); display: block; margin-top: 2px; letter-spacing: 0.5px; }

/* Bodyweight */
.bw-card { margin: 10px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.bw-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.bw-lbl { font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; }
.bw-cur { font-size: 12px; font-weight: 700; color: var(--text2); }
.bw-row { display: flex; gap: 8px; }
.bw-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 9px 12px; }
.bw-btn { background: var(--accent); border: none; border-radius: 8px; color: var(--bg); font-size: 12px; font-weight: 800; padding: 9px 16px; letter-spacing: 0.5px; }

/* Exercise list */
.ex-list { padding: 10px 20px 0; }
.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; transition: all 0.2s; }
.ex-card.has-sets { border-color: var(--border2); }
.ex-card.flash { background: var(--surface2); }
.ex-card.dragging { opacity: 0.4; }
.ex-card.drag-over { border-color: var(--accent); }
.ex-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.ex-left { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; }
.drag-handle { color: var(--text3); font-size: 14px; padding: 2px 0; cursor: grab; user-select: none; flex-shrink: 0; line-height: 1.4; }
.drag-handle:active { cursor: grabbing; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 2px; }
.ex-name.active { color: var(--text); }
.ex-last { font-size: 10px; color: var(--text3); }
.ex-last strong { color: var(--text2); }
.ex-badges { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.badge { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; }
.badge-pr { background: var(--accent); color: var(--bg); }
.badge-custom { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.ex-rm { background: none; border: none; color: var(--text3); font-size: 14px; padding: 2px 4px; }
.sets-list { margin-bottom: 8px; display: flex; flex-direction: column; gap: 3px; }
.set-row { display: flex; align-items: center; gap: 6px; }
.set-num { font-size: 9px; font-weight: 800; color: var(--text3); width: 18px; letter-spacing: 0.5px; }
.set-chip { flex: 1; background: var(--surface2); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 700; color: var(--accent); }
.set-chip.pr { background: #1a1a1a; border: 1px solid var(--accent); }
.set-del { background: none; border: none; color: var(--text3); font-size: 13px; padding: 0 2px; }
.input-row { display: flex; gap: 6px; }
.ex-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 9px 10px; }
.ex-input::placeholder { color: var(--text3); }
.add-btn { background: var(--accent); border: none; border-radius: 8px; color: var(--bg); font-size: 22px; font-weight: 900; width: 40px; flex-shrink: 0; }

/* Insert / add exercise */
.insert-zone { display: flex; justify-content: center; margin: 4px 0; }
.insert-btn { background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--text3); font-size: 9px; padding: 3px 18px; letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase; }
.add-ex-form { display: flex; gap: 6px; margin: 6px 0; }
.add-ex-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 13px; padding: 9px 12px; }
.add-ex-ok { background: var(--accent); border: none; border-radius: 8px; color: var(--bg); font-weight: 800; font-size: 12px; padding: 9px 14px; letter-spacing: 0.5px; }
.add-ex-cancel { background: var(--surface2); border: none; border-radius: 8px; color: var(--text2); font-weight: 700; font-size: 12px; padding: 9px 12px; }
.add-end-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px dashed var(--border); background: transparent; color: var(--text3); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

/* Notes */
.notes-section { margin: 10px 20px 0; }
.notes-lbl { font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.notes-ta { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text2); font-size: 13px; padding: 12px 14px; resize: none; min-height: 60px; }
.notes-ta::placeholder { color: var(--text3); }

/* Finish */
.finish-wrap { padding: 12px 20px 0; }
.finish-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: var(--accent); color: var(--bg); font-size: 13px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; }

/* History */
.hist-wrap { padding: 14px 20px 0; }
.hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.hist-count { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }
.clear-all-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); font-size: 9px; padding: 4px 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.hist-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.hist-day { font-size: 13px; font-weight: 700; }
.hist-right { display: flex; align-items: center; gap: 8px; }
.hist-date { font-size: 10px; color: var(--text3); }
.hist-del { background: none; border: none; color: var(--text3); font-size: 15px; padding: 0 2px; }
.hist-meta { display: flex; gap: 12px; margin-bottom: 8px; }
.hist-meta-item { font-size: 10px; color: var(--text3); }
.hist-meta-item b { color: var(--text2); font-weight: 700; }
.hist-notes { font-size: 11px; color: var(--text3); font-style: italic; margin-bottom: 8px; padding-left: 10px; border-left: 2px solid var(--border2); line-height: 1.5; }
.hist-ex { margin-bottom: 8px; }
.hist-ex-name { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
.hist-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.hist-chip { background: var(--surface2); border-radius: 5px; padding: 3px 8px; font-size: 11px; color: var(--text2); font-weight: 700; }

/* Body view */
.body-wrap { padding: 14px 20px 0; }
.graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.graph-lbl { font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; }
.graph-bars { display: flex; gap: 4px; align-items: flex-end; height: 80px; }
.graph-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.graph-bar { width: 100%; background: var(--surface2); border-radius: 3px 3px 0 0; min-height: 3px; }
.graph-bar.latest { background: var(--accent); }
.graph-bar-lbl { font-size: 8px; color: var(--text3); }
.bw-list { display: flex; flex-direction: column; gap: 6px; }
.bw-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.bw-item-weight { font-size: 16px; font-weight: 900; }
.bw-item-date { font-size: 10px; color: var(--text3); }
.bw-item-change { font-size: 11px; font-weight: 700; }
.empty { color: var(--text3); font-size: 13px; text-align: center; margin-top: 80px; line-height: 2.2; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-eyebrow">Training Log</div>
    <div class="hdr-name">JEFF</div>
  </div>
  <div class="hdr-tabs">
    <button class="htab on" id="tab-log" onclick="switchView('log')">Log</button>
    <button class="htab" id="tab-history" onclick="switchView('history')">Hist <span id="hcount">0</span></button>
    <button class="htab" id="tab-body" onclick="switchView('body')">Body</button>
  </div>
</div>

<!-- LOG VIEW -->
<div id="view-log">
  <div class="day-scroll"><div class="day-inner" id="day-tabs"></div></div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="v-sets">0</div><div class="stat-lbl">Sets</div></div>
    <div class="stat"><div class="stat-val" id="v-ton">0</div><div class="stat-lbl">Tonnage</div></div>
    <div class="stat"><div class="stat-val" id="v-exs">0</div><div class="stat-lbl">Exercises</div></div>
    <div class="stat"><div class="stat-val" id="v-dur">0:00</div><div class="stat-lbl">Duration</div></div>
  </div>

  <!-- Rest Timer -->
  <div class="timer-card" id="timer-card">
    <div class="timer-top">
      <div class="timer-label">Rest Timer</div>
      <div class="timer-status" id="t-status"></div>
    </div>
    <div class="timer-display" id="t-display" style="color:var(--text3);">0<span>:00</span></div>
    <div class="timer-btns">
      <button class="timer-main-btn" id="t-mainbtn" onclick="swToggle()" style="background:var(--accent);color:var(--bg);">▶ Start</button>
      <button class="timer-reset-btn" onclick="swReset()">Reset</button>
    </div>
    <div class="timer-presets">
      <button class="timer-preset" onclick="swSetPreset(90)">90s<span class="timer-preset-lbl">Isolation</span></button>
      <button class="timer-preset" onclick="swSetPreset(120)">2 min<span class="timer-preset-lbl">Accessory</span></button>
      <button class="timer-preset" onclick="swSetPreset(180)">3 min<span class="timer-preset-lbl">Compound</span></button>
    </div>
  </div>

  <!-- Bodyweight quick log -->
  <div class="bw-card">
    <div class="bw-top">
      <div class="bw-lbl">Bodyweight</div>
      <div class="bw-cur" id="bw-cur"></div>
    </div>
    <div class="bw-row">
      <input class="bw-input" type="number" id="bw-in" placeholder="lbs today...">
      <button class="bw-btn" onclick="logBW()">Log</button>
    </div>
  </div>

  <div class="ex-list" id="ex-list"></div>

  <div class="notes-section">
    <div class="notes-lbl">Session Notes</div>
    <textarea class="notes-ta" id="sess-notes" placeholder="How'd it feel? Anything to note..."></textarea>
  </div>

  <div class="finish-wrap" id="finish-wrap"></div>
</div>

<!-- HISTORY VIEW -->
<div id="view-history" style="display:none">
  <div class="hist-wrap" id="hist-list"></div>
</div>

<!-- BODY VIEW -->
<div id="view-body" style="display:none">
  <div class="body-wrap">
    <div class="graph-card">
      <div class="graph-lbl">Bodyweight Trend</div>
      <div class="graph-bars" id="bw-graph"></div>
    </div>
    <div class="bw-list" id="bw-list"></div>
  </div>
</div>

<script>
const PROGRAM = {
  "Day 1 — Chest + Tri": ["Incline Smith Press","Flat DB Press","Incline DB Press","Cable Fly (low to high)","Pec Deck","Skull Crushers","Rope Pushdown"],
  "Day 2 — Back + Bi": ["Chest-Supported Row (plate loaded)","Lat Pulldown (wide grip)","Seated Cable Row","Cable Pullover","Face Pull","Rear Delt Machine","EZ Bar Curl","Incline DB Curl","Assisted Pull-Up Burnout"],
  "Day 3 — Shoulders + Arms": ["Smith Seated Press","Seated Machine Press","Lateral Raise Machine","DB Lateral Raise","Rear Delt Machine","Skull Crushers","Overhead Cable Extension","Rope Pushdown","EZ Bar Curl","Incline DB Curl","Cable Curl","Hammer Curl"],
  "Day 4 — Chest + Tri": ["Flat Barbell Press","Incline DB Press","Flat DB Press","Cable Fly (high to low)","Dips","Overhead Cable Extension","Tricep Pushdown (straight bar)"],
  "Day 5 — Back + Bi": ["Chest-Supported Row (plate loaded)","Single Arm DB Row","Lat Pulldown (neutral grip)","Cable Pullover","Rear Delt Machine","Preacher Curl","Hammer Curl","Assisted Pull-Up Burnout"],
  "Day 6 — Legs + Shoulders + Arms": ["Leg Press","Hack Squat","Leg Extension","Lying Leg Curl","Romanian Deadlift","Standing Calf Raise","Seated Calf Raise","Cable Crunch","Smith Seated Press","Lateral Raise Machine","Overhead Cable Extension","Rope Pushdown","EZ Bar Curl","Hammer Curl"]
};
const DAY_KEYS = Object.keys(PROGRAM);
const SK = "jt_s_v3", HK = "jt_h_v3", BWK = "jt_bw_v2";

const SEED = [{
  date:"Jun 26, 2026", day:"Day 3 — Shoulders + Arms",
  notes:"First session at the new gym. Shoulders were light so added extra volume. Bis were sore from back day.",
  totalSets:37, tonnage:27845,
  exercises:{
    "Smith Seated Press":[{weight:"135",reps:"10"},{weight:"185",reps:"9"},{weight:"205",reps:"4"},{weight:"185",reps:"9"}],
    "Lateral Raise Machine":[{weight:"33",reps:"10"},{weight:"33",reps:"10"},{weight:"33",reps:"10"},{weight:"33",reps:"10"}],
    "Seated Machine Press":[{weight:"160",reps:"15"},{weight:"160",reps:"15"},{weight:"160",reps:"14"},{weight:"160",reps:"12"}],
    "Rear Delt Machine":[{weight:"120",reps:"15"},{weight:"145",reps:"15"},{weight:"145",reps:"15"},{weight:"145",reps:"15"}],
    "DB Lateral Raise":[{weight:"30",reps:"15"},{weight:"25",reps:"15"},{weight:"25",reps:"12"}],
    "EZ Bar Curl":[{weight:"80",reps:"10"},{weight:"80",reps:"8"},{weight:"80",reps:"8"},{weight:"80",reps:"6"}],
    "Incline DB Curl":[{weight:"30",reps:"12"},{weight:"30",reps:"12"},{weight:"25",reps:"15"}],
    "Overhead Cable Extension":[{weight:"60",reps:"15"},{weight:"80",reps:"15"},{weight:"95",reps:"12"}],
    "Rope Pushdown":[{weight:"85",reps:"10"},{weight:"85",reps:"10"},{weight:"85",reps:"10"}],
    "Cable Curl":[{weight:"80",reps:"10"},{weight:"80",reps:"10"},{weight:"80",reps:"10"}]
  }
}];

// State
let activeDay = DAY_KEYS[2];
let session = {}, history = [], bwLog = [], inputState = {}, addingAfter = null;
let swRunning = false, swElapsed = 0, swStart = null, swInterval = null;
let presetMode = false, presetTarget = 0, presetInterval = null;
let sessStart = null, durInterval = null;
let dragSrc = null;

function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function today(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function calcTon(exs){let t=0;Object.values(exs||{}).forEach(s=>s.forEach(x=>t+=(+x.weight||0)*(+x.reps||0)));return Math.round(t);}
function getSets(){return Object.values(session[activeDay]?.exercises||{}).reduce((a,s)=>a+s.length,0);}
function getExs(){return Object.values(session[activeDay]?.exercises||{}).filter(s=>s.length>0).length;}
function getOrder(d){return session[d]?.order||[...PROGRAM[d]];}

function load(){
  session=ls(SK,{});
  history=ls(HK,null);
  if(!history||!history.length){history=SEED;}
  bwLog=ls(BWK,[]);
  ss(HK,history);
}
function save(){ss(SK,session);ss(HK,history);ss(BWK,bwLog);}

// PR lookup
function getPR(ex){
  let m=0;
  history.forEach(h=>(h.exercises?.[ex]||[]).forEach(s=>{if((+s.weight||0)>m)m=+s.weight;}));
  return m;
}
function getLastSets(dayKey,ex){
  const past=history.filter(h=>h.day===dayKey);
  return past.length?past[0].exercises?.[ex]||null:null;
}

// Stopwatch (count up)
function swToggle(){
  if(presetMode){clearInterval(presetInterval);presetMode=false;}
  if(swRunning){swRunning=false;clearInterval(swInterval);swElapsed=Date.now()-swStart;}
  else{swRunning=true;swStart=Date.now()-swElapsed;swInterval=setInterval(swTick,100);}
  swRender();
}
function swReset(){
  swRunning=false;presetMode=false;
  clearInterval(swInterval);clearInterval(presetInterval);
  swElapsed=0;swRender();
  document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('active-preset'));
}
function swTick(){swElapsed=Date.now()-swStart;swRender();}

// Preset countdown
function swSetPreset(secs){
  swRunning=false;presetMode=true;
  clearInterval(swInterval);clearInterval(presetInterval);
  swElapsed=0;presetTarget=secs*1000;
  document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('active-preset'));
  event.currentTarget.classList.add('active-preset');
  let remaining=secs*1000;
  swRenderPreset(remaining);
  presetInterval=setInterval(()=>{
    remaining-=100;
    if(remaining<=0){remaining=0;clearInterval(presetInterval);presetMode=false;document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('active-preset'));}
    swRenderPreset(remaining);
  },100);
}
function swRenderPreset(remaining){
  const ts=Math.floor(remaining/1000),m=Math.floor(ts/60),s=ts%60,t=Math.floor((remaining%1000)/100);
  const pct=remaining/presetTarget;
  const color=pct>0.5?'var(--text)':pct>0.2?'var(--yellow)':'var(--green)';
  document.getElementById('t-display').style.color=color;
  document.getElementById('t-display').innerHTML=`${m}<span>:${String(s).padStart(2,'0')}.${t}</span>`;
  document.getElementById('t-status').textContent=remaining<=0?'GO!':'COUNTING DOWN';
  document.getElementById('t-status').style.color=remaining<=0?'var(--green)':color;
  document.getElementById('timer-card').style.borderColor=remaining<=0?'var(--green)':color;
  const btn=document.getElementById('t-mainbtn');
  btn.textContent='■ Stop';btn.style.background='var(--surface2)';btn.style.color='var(--text2)';
  btn.onclick=swReset;
}
function swRender(){
  if(presetMode)return;
  const ts=Math.floor(swElapsed/1000),m=Math.floor(ts/60),s=ts%60,t=Math.floor((swElapsed%1000)/100);
  const color=swRunning?(ts<90?'var(--text)':ts<180?'var(--yellow)':'var(--red)'):'var(--text3)';
  document.getElementById('t-display').style.color=color;
  document.getElementById('t-display').innerHTML=`${m}<span>:${String(s).padStart(2,'0')}.${t}</span>`;
  document.getElementById('timer-card').style.borderColor=swRunning?color:'var(--border)';
  const st=document.getElementById('t-status');
  if(swRunning){st.textContent=ts<90?'RESTING':ts<180?'ALMOST READY':'READY ✓';st.style.color=color;}
  else{st.textContent='';}
  const btn=document.getElementById('t-mainbtn');
  btn.onclick=swToggle;
  if(swRunning){btn.textContent='⏸ Pause';btn.style.background='var(--surface2)';btn.style.color='var(--text2)';}
  else{btn.textContent=swElapsed>0?'▶ Resume':'▶ Start';btn.style.background='var(--accent)';btn.style.color='var(--bg)';}
}

// Duration
function startDur(){if(!sessStart){sessStart=Date.now();durInterval=setInterval(updateDur,1000);}}
function updateDur(){
  const e=Math.floor((Date.now()-sessStart)/1000),m=Math.floor(e/60),s=e%60;
  document.getElementById('v-dur').textContent=`${m}:${String(s).padStart(2,'0')}`;
}

// BW
function logBW(){
  const v=parseFloat(document.getElementById('bw-in').value);
  if(!v)return;
  bwLog.unshift({weight:v,date:today()});
  document.getElementById('bw-in').value='';
  save();renderBWCur();
}
function renderBWCur(){
  document.getElementById('bw-cur').textContent=bwLog.length?`${bwLog[0].weight} lbs`:'';
}

// View switching
function switchView(v){
  ['log','history','body'].forEach(x=>{
    document.getElementById('view-'+x).style.display=v===x?'':'none';
    document.getElementById('tab-'+x).className='htab'+(v===x?' on':'');
  });
  if(v==='history')renderHistory();
  if(v==='body')renderBody();
}

// Day tabs
function renderDayTabs(){
  const c=document.getElementById('day-tabs');c.innerHTML='';
  DAY_KEYS.forEach((d,i)=>{
    const on=d===activeDay;
    const has=session[d]&&Object.values(session[d].exercises||{}).some(s=>s.length>0);
    const b=document.createElement('button');
    b.className='daybtn'+(on?' on':has?' has':'');
    b.textContent=`D${i+1}`;
    if(has&&!on){const dot=document.createElement('span');dot.className='daydot';b.appendChild(dot);}
    b.onclick=()=>{activeDay=d;addingAfter=null;render();};
    c.appendChild(b);
  });
}

// Stats
function renderStats(){
  const sets=getSets(),ton=calcTon(session[activeDay]?.exercises),exs=getExs();
  document.getElementById('v-sets').textContent=sets;
  document.getElementById('v-ton').textContent=ton>=1000?(ton/1000).toFixed(1)+'k':ton;
  document.getElementById('v-exs').textContent=exs;
  document.getElementById('hcount').textContent=history.length;
  document.getElementById('sess-notes').value=session[activeDay]?.notes||'';
  document.getElementById('sess-notes').oninput=e=>{
    if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
    session[activeDay].notes=e.target.value;save();
  };
}

// Drag and drop reorder
function setupDrag(card, ex){
  card.draggable=true;
  card.addEventListener('dragstart',e=>{dragSrc=ex;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(dragSrc===ex||!dragSrc)return;
    if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
    const order=session[activeDay].order||[...PROGRAM[activeDay]];
    const from=order.indexOf(dragSrc),to=order.indexOf(ex);
    if(from<0||to<0)return;
    order.splice(from,1);order.splice(to,0,dragSrc);
    session[activeDay].order=order;
    save();render();
  });
}

// Exercise list
function renderExList(){
  const order=getOrder(activeDay);
  const dayLog=session[activeDay]?.exercises||{};
  const c=document.getElementById('ex-list');c.innerHTML='';

  order.forEach((ex,idx)=>{
    const sets=dayLog[ex]||[];
    const isCustom=!PROGRAM[activeDay].includes(ex);
    const lastSets=getLastSets(activeDay,ex);
    const pr=getPR(ex);
    const curMax=sets.length?Math.max(...sets.map(s=>+s.weight||0)):0;
    const isPR=curMax>0&&curMax>pr;

    const card=document.createElement('div');
    card.className='ex-card'+(sets.length?' has-sets':'');
    setupDrag(card,ex);

    // Top row
    const top=document.createElement('div');top.className='ex-top';
    const left=document.createElement('div');left.className='ex-left';
    const handle=document.createElement('div');handle.className='drag-handle';handle.textContent='⠿';
    const info=document.createElement('div');info.className='ex-info';
    const name=document.createElement('div');name.className='ex-name'+(sets.length?' active':'');name.textContent=ex;
    info.appendChild(name);

    if(lastSets?.length){
      const lastMax=Math.max(...lastSets.map(s=>+s.weight||0));
      const lastMaxR=Math.max(...lastSets.map(s=>+s.reps||0));
      const last=document.createElement('div');last.className='ex-last';
      last.innerHTML=`Last: <strong>${lastSets.length}×${lastMax}lbs · ${lastMaxR} reps</strong>`;
      info.appendChild(last);
    }

    left.appendChild(handle);left.appendChild(info);

    const badges=document.createElement('div');badges.className='ex-badges';
    if(isPR){const b=document.createElement('span');b.className='badge badge-pr';b.textContent='PR';badges.appendChild(b);}
    if(isCustom){const b=document.createElement('span');b.className='badge badge-custom';b.textContent='CUSTOM';badges.appendChild(b);
      const rm=document.createElement('button');rm.className='ex-rm';rm.textContent='✕';rm.onclick=()=>removeEx(ex);badges.appendChild(rm);}

    top.appendChild(left);top.appendChild(badges);
    card.appendChild(top);

    // Sets
    if(sets.length){
      const sl=document.createElement('div');sl.className='sets-list';
      sets.forEach((s,i)=>{
        const setIsPR=(+s.weight||0)>0&&(+s.weight||0)>pr;
        const row=document.createElement('div');row.className='set-row';
        const num=document.createElement('div');num.className='set-num';num.textContent=`S${i+1}`;
        const chip=document.createElement('div');chip.className='set-chip'+(setIsPR?' pr':'');
        chip.textContent=`${s.weight?s.weight+' lbs':''}${s.weight&&s.reps?' · ':''}${s.reps?s.reps+' reps':''}`;
        const del=document.createElement('button');del.className='set-del';del.textContent='✕';del.onclick=()=>delSet(ex,i);
        row.appendChild(num);row.appendChild(chip);row.appendChild(del);sl.appendChild(row);
      });
      card.appendChild(sl);
    }

    // Input
    const ir=document.createElement('div');ir.className='input-row';
    const wi=document.createElement('input');wi.type='number';wi.className='ex-input';wi.placeholder='lbs';
    wi.value=inputState[ex]?.weight||'';
    wi.oninput=e=>{if(!inputState[ex])inputState[ex]={};inputState[ex].weight=e.target.value;};
    const ri=document.createElement('input');ri.type='number';ri.className='ex-input';ri.placeholder='reps';
    ri.value=inputState[ex]?.reps||'';
    ri.oninput=e=>{if(!inputState[ex])inputState[ex]={};inputState[ex].reps=e.target.value;};
    ri.onkeydown=e=>{if(e.key==='Enter')addSet(ex);};
    const ab=document.createElement('button');ab.className='add-btn';ab.textContent='+';ab.onclick=()=>addSet(ex);
    ir.appendChild(wi);ir.appendChild(ri);ir.appendChild(ab);
    card.appendChild(ir);
    c.appendChild(card);

    // Insert between
    if(addingAfter===ex){
      c.appendChild(buildAddExForm(ex));
    } else {
      const iz=document.createElement('div');iz.className='insert-zone';
      const ib=document.createElement('button');ib.className='insert-btn';ib.textContent='+ insert';
      ib.onclick=()=>{addingAfter=ex;render();};
      iz.appendChild(ib);c.appendChild(iz);
    }
  });

  // Add to end
  if(addingAfter==='__end__'){
    c.appendChild(buildAddExForm('__end__'));
  } else {
    const eb=document.createElement('button');eb.className='add-end-btn';eb.textContent='+ Add Exercise';
    eb.onclick=()=>{addingAfter='__end__';render();};
    c.appendChild(eb);
  }

  // Finish btn
  const sets=getSets();
  const fw=document.getElementById('finish-wrap');fw.innerHTML='';
  if(sets>0){
    const btn=document.createElement('button');btn.className='finish-btn';
    btn.textContent=`Complete Session · ${sets} Sets`;
    btn.onclick=finishSession;fw.appendChild(btn);
  }
}

function buildAddExForm(afterEx){
  const form=document.createElement('div');form.className='add-ex-form';
  const inp=document.createElement('input');inp.className='add-ex-input';inp.placeholder='Exercise name...';inp.type='text';
  inp.onkeydown=e=>{if(e.key==='Enter')confirmAddEx(afterEx,inp.value);if(e.key==='Escape'){addingAfter=null;render();}};
  const ok=document.createElement('button');ok.className='add-ex-ok';ok.textContent='Add';ok.onclick=()=>confirmAddEx(afterEx,inp.value);
  const cancel=document.createElement('button');cancel.className='add-ex-cancel';cancel.textContent='✕';cancel.onclick=()=>{addingAfter=null;render();};
  form.appendChild(inp);form.appendChild(ok);form.appendChild(cancel);
  setTimeout(()=>inp.focus(),50);
  return form;
}

function render(){
  renderDayTabs();renderStats();renderExList();renderBWCur();
}

// History
function renderHistory(){
  const c=document.getElementById('hist-list');
  c.innerHTML=`<div class="hist-header"><div class="hist-count">${history.length} Sessions</div>${history.length?`<button class="clear-all-btn" onclick="clearAll()">Clear All</button>`:''}</div>`;
  if(!history.length){c.innerHTML+='<div class="empty">No sessions yet.<br>Finish a session to see it here.</div>';return;}
  history.forEach((s,idx)=>{
    const card=document.createElement('div');card.className='hist-card';
    const ton=s.tonnage||calcTon(s.exercises);
    const sets=s.totalSets||Object.values(s.exercises||{}).reduce((a,x)=>a+x.length,0);
    card.innerHTML=`
      <div class="hist-card-top">
        <div><div class="hist-day">${s.day}</div></div>
        <div class="hist-right"><div class="hist-date">${s.date}</div><button class="hist-del" onclick="delSession(${idx})">✕</button></div>
      </div>
      <div class="hist-meta">
        <div class="hist-meta-item"><b>${sets}</b> sets</div>
        <div class="hist-meta-item"><b>${ton.toLocaleString()}</b> lbs</div>
      </div>
      ${s.notes?`<div class="hist-notes">${s.notes}</div>`:''}
    `;
    Object.entries(s.exercises||{}).forEach(([ex,sets])=>{
      if(!sets.length)return;
      const ed=document.createElement('div');ed.className='hist-ex';
      ed.innerHTML=`<div class="hist-ex-name">${ex}</div>`;
      const chips=document.createElement('div');chips.className='hist-chips';
      sets.forEach(st=>{const ch=document.createElement('div');ch.className='hist-chip';ch.textContent=`${st.weight||'—'}×${st.reps||'—'}`;chips.appendChild(ch);});
      ed.appendChild(chips);card.appendChild(ed);
    });
    c.appendChild(card);
  });
}

function delSession(idx){if(!confirm('Delete this session?'))return;history.splice(idx,1);save();renderHistory();document.getElementById('hcount').textContent=history.length;}
function clearAll(){if(!confirm('Delete ALL history? Cannot be undone.'))return;history=[];save();renderHistory();document.getElementById('hcount').textContent=0;}

// Body view
function renderBody(){
  const g=document.getElementById('bw-graph');const l=document.getElementById('bw-list');
  g.innerHTML='';l.innerHTML='';
  if(!bwLog.length){g.innerHTML='<div style="color:var(--text3);font-size:11px;align-self:center;">No data yet — log your weight above</div>';return;}
  const recent=[...bwLog].slice(0,14).reverse();
  const min=Math.min(...recent.map(b=>b.weight))-2,max=Math.max(...recent.map(b=>b.weight))+2,range=max-min||1;
  recent.forEach((b,i)=>{
    const h=Math.round(((b.weight-min)/range)*70)+10;
    const wrap=document.createElement('div');wrap.className='graph-bar-wrap';
    const bar=document.createElement('div');bar.className='graph-bar'+(i===recent.length-1?' latest':'');bar.style.height=h+'px';
    const lbl=document.createElement('div');lbl.className='graph-bar-lbl';lbl.textContent=b.weight;
    wrap.appendChild(bar);wrap.appendChild(lbl);g.appendChild(wrap);
  });
  bwLog.forEach((b,i)=>{
    const prev=bwLog[i+1];const diff=prev?+(b.weight-prev.weight).toFixed(1):null;
    const item=document.createElement('div');item.className='bw-item';
    const changeColor=diff===null?'var(--text3)':diff>0?'var(--green)':diff<0?'var(--red)':'var(--text3)';
    item.innerHTML=`<div class="bw-item-weight">${b.weight} lbs</div><div class="bw-item-date">${b.date}</div>${diff!==null?`<div class="bw-item-change" style="color:${changeColor}">${diff>0?'+':''}${diff} lbs</div>`:''}`;
    l.appendChild(item);
  });
}

// Set operations
function addSet(ex){
  const w=inputState[ex]?.weight||'',r=inputState[ex]?.reps||'';
  if(!w&&!r)return;
  if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
  if(!session[activeDay].exercises[ex])session[activeDay].exercises[ex]=[];
  session[activeDay].exercises[ex].push({weight:w,reps:r});
  if(inputState[ex])inputState[ex].reps='';
  if(!sessStart)startDur();
  save();render();
}
function delSet(ex,idx){
  session[activeDay]?.exercises[ex]?.splice(idx,1);
  save();render();
}
function confirmAddEx(afterEx,name){
  name=(name||'').trim();if(!name){addingAfter=null;render();return;}
  if(!session[activeDay])session[activeDay]={date:today(),exercises:{},order:[...PROGRAM[activeDay]]};
  if(!session[activeDay].order)session[activeDay].order=[...PROGRAM[activeDay]];
  const order=session[activeDay].order;
  const idx=afterEx==='__end__'?order.length:order.indexOf(afterEx)+1;
  order.splice(idx,0,name);
  addingAfter=null;save();render();
}
function removeEx(ex){
  if(!session[activeDay])return;
  session[activeDay].order=(session[activeDay].order||PROGRAM[activeDay]).filter(e=>e!==ex);
  delete session[activeDay].exercises[ex];
  save();render();
}
function finishSession(){
  const day=session[activeDay];if(!day)return;
  if(!Object.values(day.exercises||{}).some(s=>s.length>0))return;
  const sets=getSets(),ton=calcTon(day.exercises),notes=day.notes||'';
  history.unshift({date:day.date||today(),day:activeDay,exercises:day.exercises,notes,totalSets:sets,tonnage:ton});
  delete session[activeDay];
  if(durInterval){clearInterval(durInterval);durInterval=null;sessStart=null;}
  document.getElementById('v-dur').textContent='0:00';
  save();render();
  document.getElementById('hcount').textContent=history.length;
}

// Init
load();render();swRender();renderBWCur();
</script>
</body>
</html>
